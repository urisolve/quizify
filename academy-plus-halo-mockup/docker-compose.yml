services:
  urisolve:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: halo-ai-engineering-app
    ports:
      - "2030:3000"
    volumes:
      - ./app:/usr/src/app/app
      - ./db:/usr/src/app/db
    depends_on:
      - mysql
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      BASE_URL: ${BASE_URL}
      APP_NAME: ${APP_NAME}
      SESSION_SECRET: ${SESSION_SECRET}
      LOG_LEVEL: ${LOG_LEVEL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      BOTH_MODELS_PROB: ${BOTH_MODELS_PROB}
      ENABLE_ANALYTICS: ${ENABLE_ANALYTICS}
      ENABLE_CHATBOT: ${ENABLE_CHATBOT}
    networks:
      - app-network

  mysql:
    image: mariadb:10.5
    container_name: halo_mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3310:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:5.1.0
    container_name: halo_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "8085:80"
    depends_on:
      - mysql
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data: